<header class="site-header" id="site-header">
  <div class="header-top">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-logo">
        <span class="logo-text">{{ site.title }}</span>
        <span class="logo-tagline">{{ site.description }}</span>
      </a>
      <div class="header-controls">
        <button class="search-toggle" id="searchToggle" aria-label="Pesquisar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="theme-toggle" id="themeToggle" aria-label="Mudar tema">
          <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Barra de pesquisa -->
  <div class="search-bar" id="searchBar">
    <div class="container">
      <input type="text" id="searchInput" placeholder="Pesquisar artigos..." autocomplete="off">
      <button class="search-close" id="searchClose">✕</button>
    </div>
    <div class="search-results" id="searchResults"></div>
  </div>

  <!-- Navegação principal -->
  <nav class="main-nav" id="mainNav">
    <div class="container">
      <ul class="nav-list">
        <li><a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">Início</a></li>
        <li><a href="{{ '/categoria/noticias/' | relative_url }}" class="nav-link {% if page.categoria == 'noticias' %}active{% endif %}">📰 Notícias</a></li>
        <li><a href="{{ '/categoria/vendas/' | relative_url }}" class="nav-link {% if page.categoria == 'vendas' %}active{% endif %}">🏷️ Vendas</a></li>
        <li><a href="{{ '/categoria/guias/' | relative_url }}" class="nav-link {% if page.categoria == 'guias' %}active{% endif %}">📖 Guias</a></li>
        <li><a href="{{ '/categoria/afiliados/' | relative_url }}" class="nav-link {% if page.categoria == 'afiliados' %}active{% endif %}">🔗 Afiliados</a></li>
        <li><a href="{{ '/contacto/' | relative_url }}" class="nav-link {% if page.url == '/contacto/' %}active{% endif %}">Contacto</a></li>
      </ul>
    </div>
  </nav>
</header>
